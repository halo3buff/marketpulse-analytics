version: 2

sources:
  - name: fred
    description: >
      Macroeconomic indicator data from the Federal Reserve
      Economic Data (FRED) API.
    database: MARKETPULSE
    schema: RAW
    loaded_at_field: LOADED_AT
    freshness:
      warn_after: {count: 49, period: hour}
      error_after: {count: 168, period: hour}

    tables:
      - name: FRED_INDICATORS
        description: >
          One row per economic indicator per observation date.
          Covers fed funds rate, CPI, unemployment, 10-year
          treasury yield, and USD/EUR exchange rate.
        columns:
          - name: SERIES_ID
            description: FRED series identifier e.g. 'FEDFUNDS'
          - name: OBSERVATION_DATE
            description: The date this observation applies to
          - name: VALUE
            description: The indicator value for this observation date
          - name: LOADED_AT
            description: Timestamp when this row was loaded into Snowflake